services:
  - type: web
    name: foxclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: FOXCLAW_STATE_DIR
        value: /data/.foxclaw
      - key: FOXCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: FOXCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: foxclaw-data
      mountPath: /data
      sizeGB: 1
