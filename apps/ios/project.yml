name: FoxClaw
options:
  bundleIdPrefix: ai.foxclaw
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  FoxClawKit:
    path: ../shared/FoxClawKit
  Swabble:
    path: ../../Swabble

schemes:
  FoxClaw:
    shared: true
    build:
      targets:
        FoxClaw: all
    test:
      targets:
        - FoxClawTests
        - FoxClawLogicTests
  FoxClawLogicTests:
    shared: true
    build:
      targets:
        FoxClawLogicTests: all
    test:
      targets:
        - FoxClawLogicTests

targets:
  FoxClaw:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: FoxClawShareExtension
        embed: true
      - target: FoxClawActivityWidget
        embed: true
      - target: FoxClawWatchApp
      - package: FoxClawKit
      - package: FoxClawKit
        product: FoxClawChatUI
      - package: FoxClawKit
        product: FoxClawProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/FoxClaw.entitlements
        CODE_SIGN_STYLE: "$(FOXCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(FOXCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(FOXCLAW_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(FOXCLAW_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          FOXCLAW_PUSH_TRANSPORT: direct
          FOXCLAW_PUSH_DISTRIBUTION: local
          FOXCLAW_PUSH_RELAY_BASE_URL: ""
          FOXCLAW_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          FOXCLAW_PUSH_TRANSPORT: direct
          FOXCLAW_PUSH_DISTRIBUTION: local
          FOXCLAW_PUSH_RELAY_BASE_URL: ""
          FOXCLAW_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: FoxClaw
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.foxclaw.ios
            CFBundleURLSchemes:
              - foxclaw
        CFBundleShortVersionString: "$(FOXCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(FOXCLAW_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.foxclaw.ios.bgrefresh
        NSLocalNetworkUsageDescription: FoxClaw discovers and connects to your FoxClaw gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _foxclaw-gw._tcp
        NSCameraUsageDescription: FoxClaw can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: FoxClaw uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: FoxClaw can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: FoxClaw needs microphone access for voice wake.
        NSMotionUsageDescription: FoxClaw may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: FoxClaw needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: FoxClaw uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        FoxClawPushTransport: "$(FOXCLAW_PUSH_TRANSPORT)"
        FoxClawPushDistribution: "$(FOXCLAW_PUSH_DISTRIBUTION)"
        FoxClawPushRelayBaseURL: "$(FOXCLAW_PUSH_RELAY_BASE_URL)"
        FoxClawPushAPNsEnvironment: "$(FOXCLAW_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  FoxClawShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: FoxClawKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(FOXCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(FOXCLAW_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(FOXCLAW_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(FOXCLAW_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: FoxClaw Share
        CFBundleShortVersionString: "$(FOXCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(FOXCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  FoxClawActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/FoxClawActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(FOXCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(FOXCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(FOXCLAW_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: FoxClaw Activity
        CFBundleShortVersionString: "$(FOXCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(FOXCLAW_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  FoxClawWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: FoxClawWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(FOXCLAW_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: FoxClaw
        CFBundleShortVersionString: "$(FOXCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(FOXCLAW_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(FOXCLAW_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  FoxClawWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(FOXCLAW_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: FoxClaw
        CFBundleShortVersionString: "$(FOXCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(FOXCLAW_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(FOXCLAW_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  FoxClawTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: FoxClaw
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(FOXCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(FOXCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.foxclaw.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/FoxClaw.app/FoxClaw"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: FoxClawTests
        CFBundleShortVersionString: "$(FOXCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(FOXCLAW_BUILD_VERSION)"

  FoxClawLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: FoxClawKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(FOXCLAW_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(FOXCLAW_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.foxclaw.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: FoxClawLogicTests
        CFBundleShortVersionString: "$(FOXCLAW_MARKETING_VERSION)"
        CFBundleVersion: "$(FOXCLAW_BUILD_VERSION)"
